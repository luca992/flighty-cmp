product:
  type: kmp/lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64]

dependencies:
  - ../core: exported
  - $compose.foundation: exported
  - org.jetbrains.compose.material3:material3:1.12.0-alpha03: exported
  - org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-compose:2.11.0
  - org.jetbrains.androidx.navigation3:navigation3-ui:1.1.1
  - org.maplibre.compose:maplibre-compose:0.13.0

settings:
  android:
    compileSdk: 37
  kotlin:
    version: 2.4.0
  compose:
    enabled: true
    version: 1.12.0-beta02

# The shared module's iOS *test* binaries also link against MapLibre (pulled in
# by maplibre-compose), so the manually-downloaded framework must be on the
# linker path here too. See ios-app/module.yaml for the full story.
settings@iosSimulatorArm64:
  kotlin:
    freeCompilerArgs:
      - -linker-option
      - -F/Users/lucaspinazzola/Projects/flighty-cmp/ios-app/Frameworks/MapLibre.xcframework/ios-arm64_x86_64-simulator
      - -linker-option
      - -framework
      - -linker-option
      - MapLibre

settings@iosArm64:
  kotlin:
    freeCompilerArgs:
      - -linker-option
      - -F/Users/lucaspinazzola/Projects/flighty-cmp/ios-app/Frameworks/MapLibre.xcframework/ios-arm64
      - -linker-option
      - -framework
      - -linker-option
      - MapLibre

