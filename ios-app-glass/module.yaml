product:
  type: ios/app
  platforms: [iosArm64, iosSimulatorArm64]

dependencies:
  - ../shared

settings:
  kotlin:
    version: 2.4.0
  compose:
    enabled: true
    version: 1.12.0-beta02

# Same manual MapLibre wiring as ios-app (the toolchain has no SPM/CocoaPods);
# the xcframework is shared from ios-app/Frameworks.
settings@iosSimulatorArm64:
  kotlin:
    freeCompilerArgs:
      - -linker-option
      - -F/Users/lucaspinazzola/Projects/flighty-cmp/ios-app/Frameworks/MapLibre.xcframework/ios-arm64_x86_64-simulator
      - -linker-option
      - -framework
      - -linker-option
      - MapLibre

settings@iosArm64:
  kotlin:
    freeCompilerArgs:
      - -linker-option
      - -F/Users/lucaspinazzola/Projects/flighty-cmp/ios-app/Frameworks/MapLibre.xcframework/ios-arm64
      - -linker-option
      - -framework
      - -linker-option
      - MapLibre
