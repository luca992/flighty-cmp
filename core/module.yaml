# Compose-free domain layer: models, mock data, and ViewModels. The UI module
# (shared) consumes this; nothing here may depend on Compose.
product:
  type: kmp/lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, wasmJs]

dependencies:
  - org.jetbrains.androidx.lifecycle:lifecycle-viewmodel:2.11.0: exported
  - org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2: exported

test-dependencies:
  - org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2

settings:
  android:
    compileSdk: 37
  kotlin:
    version: 2.4.0
